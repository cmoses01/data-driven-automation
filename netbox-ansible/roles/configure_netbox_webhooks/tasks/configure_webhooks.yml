---
- name: Check for existing webhook {{ webhook.data.name }}
  ansible.builtin.uri:
    validate_certs: false
    url: "{{ netbox_url }}/api/extras/webhooks/?name={{ webhook.data.name | urlencode }}"
    method: GET
    headers:
      Authorization: "Token {{ netbox_token }}"
    return_content: true
  register: webhook_response
  loop: "{{ webhooks }}"
  loop_control:
    loop_var: webhook

- name: Create or update webhooks
  ansible.builtin.uri:
    validate_certs: false
    url: "{{ (webhook_response.results[idx].json.count == 0) | ternary(netbox_url + '/api/extras/webhooks/', netbox_url + '/api/extras/webhooks/' + (webhook_response.results[idx].json.results[0].id | string) + '/') }}"
    method: "{{ (webhook_response.results[idx].json.count == 0) | ternary('POST', 'PATCH') }}"
    headers:
      Authorization: "Token {{ netbox_token }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ item.data }}"
    status_code: [200, 201]
  loop: "{{ webhooks }}"
  loop_control:
    index_var: idx
